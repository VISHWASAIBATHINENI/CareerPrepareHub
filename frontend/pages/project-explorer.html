<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/navbar-logo.css">
  <link rel="stylesheet" href="../assets/css/auth-modal.css">
  <link rel="stylesheet" href="../assets/css/project-explorer.css">
  <title>Project Explorer - Career Prepare Hub</title>
</head>
<body data-restricted-page="true">
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="home.html" class="cph-logo-link" aria-label="Career Prepare Hub Home">
          <div class="cph-logo-wrapper" data-cph-logo>
            <svg class="cph-logo-svg" viewBox="0 0 580 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Career Prepare Hub logo">
              <defs>
                <linearGradient id="cphTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#6ec6f5" />
                  <stop offset="55%" stop-color="#3a8fd4" />
                  <stop offset="100%" stop-color="#1a5fa8" />
                </linearGradient>
                <linearGradient id="cphFrameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#6ec6f5" />
                  <stop offset="100%" stop-color="#1a5fa8" />
                </linearGradient>
                <filter id="cphFrameShadow" x="-10%" y="-10%" width="120%" height="120%">
                  <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#3a8fd4" flood-opacity="0.35" />
                </filter>
                <filter id="cphFrameGlow" x="-15%" y="-15%" width="130%" height="130%">
                  <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#3a8fd4" flood-opacity="0.65" />
                </filter>
              </defs>
              <path class="cph-frame-path" d="M 38,14  L 555,14  L 542,146  L 25,146  Z" />
              <text class="cph-text-main" x="290" y="102" text-anchor="middle">CAREER PREPARE</text>
              <text class="cph-text-hub" x="382" y="133" text-anchor="middle">HUB</text>
            </svg>
          </div>
        </a>
      </div>
    </div>
  </nav>

  <main class="explorer-main">
    <nav class="breadcrumbs" aria-label="Breadcrumb">
      <a href="home.html">Home</a>
      <span class="separator">/</span>
      <span aria-current="page">Project Explorer</span>
    </nav>

    <header class="page-header">
      <h1>Project Explorer</h1>
      <p>Explore projects by Language → Domain with filters, search, and smart pagination.</p>
    </header>

    <section class="controls">
      <div class="control-group">
        <label for="languageFilter">Programming Language</label>
        <select id="languageFilter">
          <option value="all">All Languages</option>
        </select>
      </div>

      <div class="control-group">
        <label for="domainFilter">Domain</label>
        <select id="domainFilter">
          <option value="all">All Domains</option>
        </select>
      </div>

      <div class="control-group">
        <label for="difficultyFilter">Difficulty</label>
        <select id="difficultyFilter">
          <option value="all">All Difficulties</option>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
      </div>

      <div class="control-group search-group">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="text" placeholder="Search by title, concepts, or domain...">
      </div>

    </section>

    <div class="results-bar">
      <p id="resultsMeta">Loading projects...</p>
      <div class="pagination">
        <button id="prevPageBtn" type="button">Previous</button>
        <span id="pageMeta">Page 1</span>
        <button id="nextPageBtn" type="button">Next</button>
      </div>
    </div>

    <section id="explorerContainer" class="explorer-container"></section>
  </main>

  <script src="../assets/js/navbar-logo.js"></script>
  <script src="../assets/js/project-explorer.js"></script>
  <script src="../assets/js/auth-gate.js"></script>
</body>
</html>
