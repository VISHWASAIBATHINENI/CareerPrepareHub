<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/navbar-logo.css">
  <link rel="stylesheet" href="../assets/css/login.css">
  <title>Career Prep Hub | Sign Up</title>
</head>
<body class="signup-page">
  <div class="auth-page">
    <div class="login-stack">
      <div class="brand-logo" aria-label="Career Prepare Hub logo">
        <a href="home.html" class="cph-logo-link" aria-label="Career Prepare Hub Home">
          <div class="cph-logo-wrapper" data-cph-logo>
            <svg class="cph-logo-svg" viewBox="0 0 580 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Career Prepare Hub logo">
              <defs>
                <linearGradient id="cphTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#6ec6f5" />
                  <stop offset="55%" stop-color="#3a8fd4" />
                  <stop offset="100%" stop-color="#1a5fa8" />
                </linearGradient>
                <linearGradient id="cphFrameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#6ec6f5" />
                  <stop offset="100%" stop-color="#1a5fa8" />
                </linearGradient>
                <filter id="cphFrameShadow" x="-10%" y="-10%" width="120%" height="120%">
                  <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#3a8fd4" flood-opacity="0.35" />
                </filter>
                <filter id="cphFrameGlow" x="-15%" y="-15%" width="130%" height="130%">
                  <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#3a8fd4" flood-opacity="0.65" />
                </filter>
              </defs>
              <path class="cph-frame-path" d="M 38,14  L 555,14  L 542,146  L 25,146  Z" />
              <text class="cph-text-main" x="290" y="102" text-anchor="middle">CAREER PREPARE</text>
              <text class="cph-text-hub" x="382" y="133" text-anchor="middle">HUB</text>
            </svg>
          </div>
        </a>
      </div>

    <section class="auth-card signup-card">
      <h1>Create Account</h1>
      <p class="subtitle">Register with your details to get started</p>

      <form id="signupForm" novalidate>
        <div class="grid-2">
          <div>
            <label for="firstname">First Name <span class="required">*</span></label>
            <input type="text" id="firstname" name="firstname" required>
          </div>
          <div>
            <label for="middlename">Middle Name (Optional)</label>
            <input type="text" id="middlename" name="middlename">
          </div>
        </div>

        <div class="grid-2">
          <div>
            <label for="lastname">Last Name <span class="required">*</span></label>
            <input type="text" id="lastname" name="lastname" required>
          </div>
          <div>
            <label for="dob">Date of Birth <span class="required">*</span></label>
            <input type="date" id="dob" name="dob" required>
          </div>
        </div>

        <label for="username">Username <span class="required">*</span></label>
        <input type="text" id="username" name="username" placeholder="your_username" required>

        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="password">Password <span class="required">*</span></label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="********" required>
          <button type="button" class="icon-btn" id="togglePassword" aria-label="Toggle password visibility">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <label for="confirmPassword">Re-confirm Password <span class="required">*</span></label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="********" required>
          <button type="button" class="icon-btn" id="toggleConfirmPassword" aria-label="Toggle confirm password visibility">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <div class="grid-2">
          <div>
            <label for="nationality">Nationality <span class="required">*</span></label>
            <select id="nationality" name="nationality" required>
              <option value="">Select</option>
              <option value="Indian">Indian</option>
              <option value="NRI">NRI</option>
            </select>
          </div>
          <div>
            <label for="status">Status <span class="required">*</span></label>
            <select id="status" name="status" required>
              <option value="Student">Student</option>
              <option value="Employed">Employed</option>
              <option value="Unemployed">Unemployed</option>
            </select>
          </div>
        </div>

        <button type="submit" class="primary-btn">Create Account</button>
        <p class="feedback" id="signupFeedback"></p>
      </form>

      <p class="switch-text">
        Already have an account?
        <a href="login.html">Sign In now</a>
      </p>
    </section>
    </div>
  </div>

  <script src="../assets/js/navbar-logo.js"></script>
  <script src="../assets/js/signup.js"></script>
</body>
</html>
